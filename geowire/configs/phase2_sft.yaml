defaults:
  - phase1_tip

model:
  qwen_bridge: true
  freeze_vision: true
  train_visual_merger_lora: true
  train_language_lora: true
  phase1_checkpoint: runs/phase1_tip/geowire_adapter.pt

data:
  qa_manifest: data/manifests/georoute_formal_f8/phase2_all.jsonl
  tip_manifest: data/manifests/georoute_formal_f8/phase2_tip_multiframe.jsonl
  cache_root: cache/georoute/phase1

lora:
  r: 32
  alpha: 64
  dropout: 0.05
  target_modules:
    - q_proj
    - k_proj
    - v_proj
    - o_proj
    - gate_proj
    - up_proj
    - down_proj

tip:
  qa_to_tip_batch_ratio: 15:1
  lambda_tip_effective: 0.20
  lambda_sub: 0.25
  lambda_keep: 0.02
  mask_ratio: 0.15

train:
  per_device_batch_size: 1
  gradient_accumulation_steps: 16
  max_steps: 12000
  lr_geowire: 0.0001
  lr_lora: 0.00002
  weight_decay: 0.01
  warmup_ratio: 0.03
  deepspeed: configs/deepspeed_zero2.json

runtime:
  output_dir: runs/phase2_sft
  parity_report: runs/qwen_bridge_parity/report.json
